name: Build and publish LOGIC jars to the GitHub Maven Repository
on:
  schedule:
    - cron: '59 23 * * *'  # Runs daily at 23:59 UTC
  workflow_dispatch:
    inputs:
      LOGIC_VERSION:
        description: "Base snapshot version for the build. On Sundays it is used as a base for a weekly build, other days, it is directly used as a build version. "
        type: string
        required: false
        default: 111-SNAPSHOT
      GITHUB_ORGANISATION:
        description: "GitHub organisation that contains the LOGIC repositories."
        type: string
        required: false
        default: kiegroup
      GITHUB_ORGANISATION_KIE_TOOLS:
        description: "GitHub organisation that contains the LOGIC kie-tools repository."
        type: string
        required: false
        default: kubesmarts
      BRANCH_TO_BUILD:
        description: "Branch from which the artifacts should be published."
        type: string
        required: false
        default: main
      force_cleanup_of_snapshot:
        description: "Force cleanup of built LOGIC_VERSION version regardless of schedule, if it is a SNAPSHOT version (overrides the Sunday cleanup during weekly builds)."
        type: boolean
        required: false
        default: false
      force_weekly_build:
        description: "Force weekly build regardless of schedule (overrides the Monday schedule for weekly builds). Doesn't influence the cleanup behaviour. So to also do the cleanup when overriding, please force also cleanup."
        type: boolean
        required: false
        default: false
# TODO - Implement optional tests execution
#      RUN_TESTS:
#        description: "If true, also tests will be run. "
#        type: boolean
#        required: false
#        default: false

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      logic_version: ${{ steps.set-version.outputs.logic_version }}
      is_weekly_publish_day: ${{ steps.isweeklypublish.outputs.is_weekly_publish_day }}
    steps:
      - name: Print Workflow Inputs
        run: |
          echo "=== Workflow Input Parameters ==="
          echo "LOGIC_VERSION: ${{ inputs.LOGIC_VERSION }}"
          echo "GITHUB_ORGANISATION: ${{ inputs.GITHUB_ORGANISATION }}"
          echo "GITHUB_ORGANISATION_KIE_TOOLS: ${{ inputs.GITHUB_ORGANISATION_KIE_TOOLS }}"
          echo "BRANCH_TO_BUILD: ${{ inputs.BRANCH_TO_BUILD }}"
          echo "force_cleanup_of_snapshot: ${{ inputs.force_cleanup_of_snapshot }}"
          echo "force_weekly_build: ${{ inputs.force_weekly_build }}"
          echo "=================================="

      - name: Calculate if it is weekly publishing day
        id: isweeklypublish
        run: |
          WEEK_NUM=$(date +%V)
          DAY_OF_WEEK=$(date +%u)  # 1=Monday, 7=Sunday
          IS_DAY_OF_WEEKLY=$((DAY_OF_WEEK == 7))
          echo "is_weekly_publish_day=$IS_DAY_OF_WEEKLY" >> $GITHUB_OUTPUT

      - name: Calculate weekly build version
        id: set-version
        run: |
          BASE_VERSION="${{ inputs.LOGIC_VERSION }}"
          
          if [[ "${{ steps.isweeklypublish.outputs.is_weekly_publish_day }}" == "1" || "${{ inputs.force_weekly_build == true }}" == "true" ]]; then
            # Extract version number by removing -SNAPSHOT suffix
            VERSION_NUMBER="${BASE_VERSION%-SNAPSHOT}"
            # Get current date in YYYYMMDD format
            CURRENT_DATE=$(date +%Y%m%d)
            # Create weekly version format: {version-number}-{date}-weekly
            WEEKLY_VERSION="${VERSION_NUMBER}-${CURRENT_DATE}-weekly"
            echo "Using weekly build version: $WEEKLY_VERSION"
            echo "logic_version=$WEEKLY_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Using base version: $BASE_VERSION"
            echo "logic_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    needs: prepare
    uses: ./.github/workflows/publish-logic-artifacts.yml
    with:
      LOGIC_VERSION: ${{ needs.prepare.outputs.logic_version }}
      GITHUB_ORGANISATION: ${{ inputs.GITHUB_ORGANISATION }}
      GITHUB_ORGANISATION_KIE_TOOLS: ${{ inputs.GITHUB_ORGANISATION_KIE_TOOLS }}
      BRANCH_TO_BUILD: ${{ inputs.BRANCH_TO_BUILD }}
    secrets: inherit

  cleanup:
    needs: [prepare, build-and-deploy]
    runs-on: ubuntu-latest
    if: ${{ needs.prepare.outputs.is_weekly_publish_day == '1' || inputs.force_cleanup_of_snapshot == true }}
    steps:
      - uses: actions/checkout@v6
      - name: Cleanup snapshots after publish
        id: cleanup-snapshots
        run: |
          scripts/delete-package-version.sh "${{ inputs.LOGIC_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
  build-new-snapshots-if-needed:
    needs: [prepare, build-and-deploy, cleanup]
    if: ${{ always() && needs.cleanup.result == 'success' }}
    uses: ./.github/workflows/publish-logic-artifacts.yml
    with:
      LOGIC_VERSION: ${{ inputs.LOGIC_VERSION }}
      GITHUB_ORGANISATION: ${{ inputs.GITHUB_ORGANISATION }}
      GITHUB_ORGANISATION_KIE_TOOLS: ${{ inputs.GITHUB_ORGANISATION_KIE_TOOLS }}
      BRANCH_TO_BUILD: ${{ inputs.BRANCH_TO_BUILD }}
    secrets: inherit