name: Build and publish LOGIC jars to the GitHub Maven Repository
on:
  schedule:
    - cron: '59 23 * * *'  # Runs daily at 23:59 UTC
  workflow_dispatch:
    inputs:
      LOGIC_VERSION:
        description: "LOGIC version to be built and published."
        type: string
        required: false
        default: 111-SNAPSHOT
      GITHUB_ORGANISATION:
        description: "GitHub organisation that contains the LOGIC repositories."
        type: string
        required: false
        default: kiegroup
      GITHUB_ORGANISATION_KIE_TOOLS:
        description: "GitHub organisation that contains the LOGIC kie-tools repository."
        type: string
        required: false
        default: kubesmarts
      BRANCH_TO_BUILD:
        description: "Branch from which the artifacts should be published."
        type: string
        required: false
        default: main
      MAVEN_REPOSITORY_URL:
        description: "URL of the Maven repository where artifacts will be deployed."
        type: string
        required: false
        default: https://maven.pkg.github.com/kubesmarts/logic-maven-repository
      force_cleanup_of_built_snapshot_version:
        description: "Force cleanup of built LOGIC_VERSION version regardless of schedule, if it is a SNAPSHOT version (overrides the Monday of even weeks schedule)."
        type: boolean
        required: false
        default: false
# TODO - Implement optional tests execution
#      RUN_TESTS:
#        description: "If true, also tests will be run. "
#        type: boolean
#        required: false
#        default: false

env:
  LOGIC_VERSION: ${{ inputs.LOGIC_VERSION || '111-SNAPSHOT' }}
  GITHUB_ORGANISATION: ${{ inputs.GITHUB_ORGANISATION || 'kiegroup' }}
  GITHUB_ORGANISATION_KIE_TOOLS: ${{ inputs.GITHUB_ORGANISATION_KIE_TOOLS || 'kubesmarts' }}
  BRANCH_TO_BUILD: ${{ inputs.BRANCH_TO_BUILD || 'main' }}
  MAVEN_REPOSITORY_URL: ${{ inputs.MAVEN_REPOSITORY_URL || 'https://maven.pkg.github.com/kubesmarts/logic-maven-repository' }}
  GITHUB_USERNAME: ${{ inputs.GITHUB_ORGANISATION || 'kiegroup' }}
  FORCE_CLEANUP: ${{ inputs.force_cleanup_of_built_snapshot_version == true }}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Print Workflow Inputs
        run: |
          echo "=== Workflow Input Parameters ==="
          echo "LOGIC_VERSION: ${{ inputs.LOGIC_VERSION }}"
          echo "GITHUB_ORGANISATION: ${{ inputs.GITHUB_ORGANISATION }}"
          echo "GITHUB_ORGANISATION_KIE_TOOLS: ${{ inputs.GITHUB_ORGANISATION_KIE_TOOLS }}"
          echo "BRANCH_TO_BUILD: ${{ inputs.BRANCH_TO_BUILD }}"
          echo "MAVEN_REPOSITORY_URL: ${{ inputs.MAVEN_REPOSITORY_URL }}"
          echo "force_cleanup_of_built_snapshot_version: ${{ inputs.force_cleanup_of_built_snapshot_version }}"
          echo ""
          echo "=== Resolved Environment Variables ==="
          echo "LOGIC_VERSION (env): ${{ env.LOGIC_VERSION }}"
          echo "GITHUB_ORGANISATION (env): ${{ env.GITHUB_ORGANISATION }}"
          echo "GITHUB_ORGANISATION_KIE_TOOLS (env): ${{ env.GITHUB_ORGANISATION_KIE_TOOLS }}"
          echo "BRANCH_TO_BUILD (env): ${{ env.BRANCH_TO_BUILD }}"
          echo "MAVEN_REPOSITORY_URL (env): ${{ env.MAVEN_REPOSITORY_URL }}"
          echo "GITHUB_USERNAME (env): ${{ env.GITHUB_USERNAME }}"
          echo "FORCE_CLEANUP (env): ${{ env.FORCE_CLEANUP }}"
          echo "=================================="

      - name: Checkout Drools
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITHUB_ORGANISATION }}/drools
          path: drools
          ref: ${{ env.BRANCH_TO_BUILD }}

      - name: Checkout kogito-runtimes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITHUB_ORGANISATION }}/kogito-runtimes
          path: kogito-runtimes
          ref: ${{ env.BRANCH_TO_BUILD }}

      - name: Checkout kogito-apps
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITHUB_ORGANISATION }}/kogito-apps
          path: kogito-apps
          ref: ${{ env.BRANCH_TO_BUILD }}

      - name: Checkout kubesmarts/kie-tools
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITHUB_ORGANISATION_KIE_TOOLS }}/kie-tools
          path: kie-tools
          ref: ${{ env.BRANCH_TO_BUILD }}

      - name: Update Drools version and prepare repository
        run: |
          python3 ../scripts/version-update/update-maven-versions.py ${{ env.LOGIC_VERSION }} --exclude "*/kie-ci-test-jars/*"
        working-directory: drools

      - name: Update kogito-runtimes version
        run: |
          python3 ../scripts/version-update/update-maven-versions.py ${{ env.LOGIC_VERSION }}
        working-directory: kogito-runtimes

      - name: Update kogito-apps version
        run: |
          python3 ../scripts/version-update/update-maven-versions.py ${{ env.LOGIC_VERSION }} --update-root-parent
        working-directory: kogito-apps

      - name: Update kie-tools version and prepare repository
        run: |
          python3 ../scripts/version-update/update-maven-versions.py ${{ env.LOGIC_VERSION }} --exclude "*/maven-base/*" "*/serverless-logic-web-tools-swf-deployment-quarkus-app/*"
          
          # Rewrite distributionManagement URLs in all pom.xml files to use custom Maven repository
          # This is necessary because -DaltDeploymentRepository doesn't work for the complex kie-tools structure
          ../scripts/replace-distribution-management-url.sh "$PWD" \
            "https://maven.pkg.github.com/kubesmarts/logic-maven-repository" \
            "${{ env.MAVEN_REPOSITORY_URL }}"
        working-directory: kie-tools

      - name: Update kie-tools maven-base
        run: |
          python3 ../../../scripts/version-update/update-maven-versions.py ${{ env.LOGIC_VERSION }}
          sed -i 's|<version\.org\.kie\.kogito>.*</version\.org\.kie\.kogito>|<version.org.kie.kogito>${project.version}</version.org.kie.kogito>|g' ./pom.xml
        working-directory: kie-tools/packages/maven-base

      - name: Update kie-tools serverless-logic-web-tools-swf-deployment-quarkus-app
        run: |
          python3 ../../../scripts/version-update/update-maven-versions.py ${{ env.LOGIC_VERSION }}
        working-directory: kie-tools/packages/serverless-logic-web-tools-swf-deployment-quarkus-app

      - name: Calculate if it is cleanup day for snapshots
        id: cleanupcalculation
        run: |
          WEEK_NUM=$(date +%V)
          DAY_OF_WEEK=$(date +%u)  # 1=Monday, 7=Sunday
          IS_EVEN=$((WEEK_NUM % 2 == 0))
          IS_MONDAY=$((DAY_OF_WEEK == 1))
          IS_FIRST_DAY_OF_EVEN_WEEK=$((IS_EVEN && IS_MONDAY))
          echo "is_cleanup_day=$IS_FIRST_DAY_OF_EVEN_WEEK" >> $GITHUB_OUTPUT

      - name: Extract organization from Maven URL
        if: ${{ (env.FORCE_CLEANUP == 'true' || steps.cleanupcalculation.outputs.is_cleanup_day == '1') && endsWith(env.LOGIC_VERSION, '-SNAPSHOT') }}
        id: extract-org
        run: |
          ORG=$(echo "${{ env.MAVEN_REPOSITORY_URL }}" | sed 's|https://maven.pkg.github.com/||' | cut -d'/' -f1)
          echo "organization=$ORG" >> $GITHUB_OUTPUT

      - name: Cleanup before publish (on even weeks)
        if: ${{ (env.FORCE_CLEANUP == 'true' || steps.cleanupcalculation.outputs.is_cleanup_day == '1') && endsWith(env.LOGIC_VERSION, '-SNAPSHOT') }}
        run: |
          scripts/delete-package-version.sh --owner "${{ steps.extract-org.outputs.organization }}" "${{ env.LOGIC_VERSION }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Drools artifacts
        run: mvn --batch-mode clean deploy -s ../.github/configs/settings.xml -DaltDeploymentRepository=github::${{ env.MAVEN_REPOSITORY_URL }}
        working-directory: drools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish kogito-runtimes artifacts
        run: mvn --batch-mode clean deploy -s ../.github/configs/settings.xml -DskipTests -Dfull -Dversion.org.kie=${{ env.LOGIC_VERSION }} -DaltDeploymentRepository=github::${{ env.MAVEN_REPOSITORY_URL }}
        working-directory: kogito-runtimes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish kogito-apps artifacts
        run: mvn --batch-mode clean deploy -s ../.github/configs/settings.xml -DskipTests -Dversion.org.kie=${{ env.LOGIC_VERSION }} -DaltDeploymentRepository=github::${{ env.MAVEN_REPOSITORY_URL }}
        working-directory: kogito-apps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish kie-tools artifacts
        run: mvn --batch-mode clean deploy -s ${{ github.workspace }}/.github/configs/settings.xml -DskipTests -Drevision=${{ env.LOGIC_VERSION }} -Dversion.org.kie.kogito=${{ env.LOGIC_VERSION }} -Dskip.maven.deploy.in.pnpm.wrapped.artifacts=false -DaltDeploymentRepository=github::${{ env.MAVEN_REPOSITORY_URL }}
        working-directory: kie-tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_ARGS: --settings=${{ github.workspace }}/.github/configs/settings.xml -Drevision=${{ env.LOGIC_VERSION }}
          KIE_TOOLS_BUILD__mavenDeploySkip: false
          DROOLS_AND_KOGITO__skip: true
          KIE_TOOLS_BUILD__runTests: false
          KIE_TOOLS_BUILD__runEndToEndTests: false
          KIE_TOOLS_BUILD__buildContainerImages: false
          KIE_TOOLS_BUILD__containerizedEndToEndTests: false
          KIE_TOOLS_BUILD__ignoreTestFailures: true
          KIE_TOOLS_BUILD__ignoreEndToEndTestFailures: true
          DROOLS_AND_KOGITO__droolsRepoUrl: https://github.com/kiegroup/drools
          DROOLS_AND_KOGITO__kogitoRuntimesRepoUrl: https://github.com/kiegroup/kogito-runtimes
          DROOLS_AND_KOGITO__kogitoAppsRepoUrl: https://github.com/kiegroup/kogito-apps
